# Local demo target: runs the deploy against the same Docker daemon the
# pipeline built the image on. In a real automotive multi-repo fleet this
# group would list the actual app servers (or an autoscaling-group lookup
# plugin) and drop the ansible_connection=local override, e.g.:
#
#   [app_servers]
#   app-01.internal ansible_host=10.0.4.11
#   app-02.internal ansible_host=10.0.4.12
#
#   [app_servers:vars]
#   ansible_user=deploy
#   ansible_ssh_private_key_file=~/.ssh/deploy_key

[app_servers]
localhost ansible_connection=local ansible_python_interpreter="{{ ansible_playbook_python }}"
